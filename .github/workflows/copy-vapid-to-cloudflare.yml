name: One-time encrypted VAPID export

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-encrypted-vapid:
    runs-on: ubuntu-latest
    steps:
      - name: Encrypt VAPID private key
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const crypto = require("crypto");

          const secret = process.env.VAPID_PRIVATE_KEY || "";
          if (!secret) {
            console.error("VAPID_PRIVATE_KEY secret is missing");
            process.exit(1);
          }

          const publicKey = [
            "-----BEGIN PUBLIC KEY-----",
            "MIIBojANBgkqhkiG9w0BAQEFAAOCAY8AMIIBigKCAYEAo97T40tS/f3Ank5eEFrq",
            "j7G2H2aeKdJ7UOmzmzc8zRkAdmJ69JGc8+wsU3UWaRZuf1RJSGnDUrNLihVRy6X6",
            "gxHnXUzPXnD0O6He8466343I5PMYOe3CoGzylQ7lz1Mf0Ye9OK+9kN0qp0CihmGv",
            "umacQsyJnYe6h0Aq2npcOhUYuVGlRQ1IK7r5Y/c/ZFl12Ob+m2RWerMlqMln47ku",
            "qGvw4+QUfDZAfOuGH1psYO2vn/60S1WSuwcuPcwHGspvAdxXPUu0fU05ANikCko4",
            "w1UTs/Iae9deYEx8STF4+W/NJckJ+k+Ss6NwgV9whwXXlmBuqSkCQtjr48wWZodP",
            "sMnvJjjJ0O/nA+hsTgwa8vU/XnEJQ1OcK/sSyxcJQPvlvp2RhxielDQsd+lRXkt+",
            "QUJVic0JusAXrLrKLoaLZKyMNpoS4MQaSBFaMpw3yZ8AEqgF+Lxn4tQURoTSIxre",
            "cWd6gWgHV8UYmpvaC53JY77z390OwMWYVoNLyIuMteZdAgMBAAE=",
            "-----END PUBLIC KEY-----"
          ].join("\n");

          const encrypted = crypto.publicEncrypt(
            {
              key: publicKey,
              padding: crypto.constants.RSA_PKCS1_OAEP_PADDING,
              oaepHash: "sha256"
            },
            Buffer.from(secret, "utf8")
          );

          fs.writeFileSync("vapid-private-key.enc", encrypted.toString("base64") + "\n", { mode: 0o600 });
          NODE

      - name: Upload encrypted VAPID artifact
        uses: actions/upload-artifact@v4
        with:
          name: vapid-private-key-encrypted
          path: vapid-private-key.enc
          retention-days: 1
          if-no-files-found: error
