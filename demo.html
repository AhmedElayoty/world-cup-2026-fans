<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#0b0f1a">
<title>World Cup Fans — Egypt Win Celebration (Demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --egy-red:#ce1126; --egy-white:#ffffff; --egy-black:#0a0a0a;
  --egy-gold:#c09e5f; --egy-green:#00a85a; --egy-mint:#6dffb5;
  --bg:#0b0f1a; --card:#141a29; --line:#222a3d; --dim:#8493c8; --ink:#e8edf7;
  --ar:'Cairo','Segoe UI',Tahoma,sans-serif;
  --la:'Oswald','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,Tahoma,sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased}

/* ---------- faux app backdrop (Matches tab) ---------- */
.topbar{position:sticky;top:0;z-index:10;background:rgba(11,15,26,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:12px 16px calc(12px + env(safe-area-inset-top,0)) 16px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.3px}
.brand .b1{color:#fff}.brand .b2{color:var(--egy-green)}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--egy-green);box-shadow:0 0 10px var(--egy-green)}
.tabs{display:flex;gap:6px;margin-top:11px;font-size:13px;color:var(--dim)}
.tabs .t{padding:6px 12px;border-radius:999px}
.tabs .t.on{color:#fff;background:rgba(0,168,90,.16);border:1px solid rgba(0,168,90,.4)}
.wrap{max-width:520px;margin:0 auto;padding:16px}
.daylab{font-size:12px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin:6px 2px 10px}
.mc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:11px}
.mc.win{border-color:rgba(0,168,90,.55);box-shadow:0 0 0 1px rgba(0,168,90,.25),0 10px 30px rgba(0,168,90,.10)}
.mc .ftrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ft{font-size:11px;font-weight:700;letter-spacing:1.4px;color:var(--dim)}
.winbadge{font-size:11px;font-weight:800;letter-spacing:1px;color:#0a160f;background:var(--egy-mint);
  padding:3px 9px;border-radius:999px}
.team{display:flex;align-items:center;gap:11px;padding:5px 0}
.flagdot{width:30px;height:30px;border-radius:8px;flex:none;background:#222a3d;display:grid;place-items:center;
  font-size:12px;font-weight:800;color:#fff;overflow:hidden}
.eg{background:linear-gradient(180deg,#ce1126 0 33.3%,#fff 33.3% 66.6%,#0a0a0a 66.6% 100%);color:transparent}
.tn{flex:1;font-weight:600}
.sc{font-variant-numeric:tabular-nums;font-weight:800;font-size:18px}
.team.w .tn{color:#fff}.team.l .tn{color:var(--dim)}
.dim{opacity:.55}
.demo-note{text-align:center;color:var(--dim);font-size:12px;margin:18px 2px 6px;letter-spacing:.3px}
.replay{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(16px + env(safe-area-inset-bottom,0));
  z-index:50;background:linear-gradient(90deg,var(--egy-red),#d81b34);color:#fff;border:1.5px solid var(--egy-gold);
  border-radius:999px;padding:12px 20px;font-weight:700;font-size:15px;letter-spacing:.3px;cursor:pointer;
  box-shadow:0 8px 24px rgba(206,17,38,.45)}
.replay:active{transform:translateX(-50%) scale(.97)}
.botnav{position:fixed;left:0;right:0;bottom:0;z-index:9;display:flex;justify-content:space-around;
  background:rgba(11,15,26,.94);border-top:1px solid var(--line);padding:7px 0 calc(7px + env(safe-area-inset-bottom,0))}
.botnav span{font-size:11px;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:3px}
.botnav span.on{color:var(--egy-green)}
.botnav b{font-size:17px;line-height:1}

/* ---------- celebration overlay ---------- */
#egyWin{position:fixed;inset:0;z-index:9000;display:none;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 18px;background:rgba(7,9,15,.93);opacity:0;
  transition:opacity .26s ease-out;touch-action:none;overflow:hidden}
#egyWin.go{opacity:1}
#egyWin.bye{opacity:0}
.glow{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(60% 45% at 50% 40%,rgba(206,17,38,.34),transparent 70%),
             radial-gradient(50% 40% at 50% 42%,rgba(192,158,95,.20),transparent 72%);
  opacity:.55;animation:glowBreathe 6s ease-in-out infinite}
.stage{position:relative;perspective:1100px;display:flex;flex-direction:column;align-items:center;
  width:100%;max-width:430px}
.flagFly{animation:flagIn .7s cubic-bezier(.16,.84,.32,1) both;will-change:transform,opacity;
  transform-style:preserve-3d}
.flag{position:relative;width:min(78vw,360px);aspect-ratio:3/2;border-radius:7px;overflow:hidden;
  border:.5px solid rgba(255,255,255,.14);filter:drop-shadow(0 18px 50px rgba(0,0,0,.6));
  animation:flagSlam .2s 620ms both;will-change:transform}
.flag.sway{animation:flagSway 6s ease-in-out infinite}
.bands{position:absolute;inset:0;
  background:linear-gradient(180deg,var(--egy-red) 0 33.33%,var(--egy-white) 33.33% 66.66%,var(--egy-black) 66.66% 100%)}
.bands::after{content:"";position:absolute;left:0;right:0;top:33.33%;height:33.34%;
  box-shadow:inset 0 1px 0 rgba(0,0,0,.06),inset 0 -1px 0 rgba(0,0,0,.05)}
.eagle{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);height:25%;width:auto;
  filter:drop-shadow(0 0 2px rgba(192,158,95,.55))}
.salah{position:relative;margin-top:-16%;width:min(52vw,210px);aspect-ratio:4/5;border-radius:16px;
  border:2px solid var(--egy-gold);overflow:hidden;
  box-shadow:0 16px 40px rgba(206,17,38,.45),0 0 0 1px rgba(255,255,255,.08);
  animation:riseIn .52s 700ms both;will-change:transform,opacity;z-index:2}
.salah::before{content:"";position:absolute;inset:-40%;z-index:-1;
  background:radial-gradient(circle,rgba(192,158,95,.45),transparent 62%);filter:blur(4px)}
.salah img{width:100%;height:100%;object-fit:cover;object-position:50% 18%;display:block}
.sweep{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.42) 47%,rgba(255,231,168,.5) 50%,transparent 66%);
  transform:translateX(-130%);animation:sweep 1.1s 900ms ease-out both}
.msg{margin-top:16px;text-align:center;max-width:92vw}
.msgAr{font-family:var(--ar);font-weight:800;font-size:clamp(26px,8.5vw,38px);line-height:1.25;color:#fff;
  text-shadow:0 2px 0 rgba(192,158,95,.45),0 0 22px rgba(206,17,38,.35);
  animation:msgIn .42s 900ms both;will-change:transform,opacity}
.rule{width:84px;height:2px;background:var(--egy-gold);margin:10px auto;transform-origin:center;
  box-shadow:0 0 8px rgba(192,158,95,.6);animation:ruleIn .5s 940ms ease-in-out both}
.msgEn{font-family:var(--la);font-weight:600;font-size:clamp(15px,4.6vw,21px);letter-spacing:2.5px;
  text-transform:uppercase;color:var(--egy-gold);line-height:1.2;animation:msgIn .42s 1020ms both;
  will-change:transform,opacity}
.cfx{position:absolute;inset:0;pointer-events:none;z-index:3}
.chantRow{position:absolute;left:0;right:0;bottom:calc(22px + env(safe-area-inset-bottom,0));z-index:4;
  display:flex;flex-direction:column;align-items:center;gap:7px;padding:0 18px}
.chantSub{font-size:10px;letter-spacing:.6px;color:rgba(232,237,247,.55);
  animation:fadeIn .4s 1600ms both}
.chant{font-family:var(--ar);font-weight:700;font-size:clamp(17px,5.2vw,22px);color:#fff;cursor:pointer;
  background:linear-gradient(90deg,var(--egy-red),#d81b34);border:1.5px solid var(--egy-gold);border-radius:999px;
  padding:14px 24px;min-height:52px;width:min(86vw,360px);max-width:100%;
  box-shadow:0 8px 26px rgba(206,17,38,.5),inset 0 1px 0 rgba(255,231,168,.5);
  display:flex;align-items:center;justify-content:center;gap:8px;
  animation:btnIn .4s 1500ms both;will-change:transform,opacity}
.chant.pulse{animation:btnPulse 2.2s ease-in-out infinite}
.chant:active{transform:scale(.97);filter:brightness(1.12)}
.chant .hrt{color:var(--egy-gold)}

@keyframes glowBreathe{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.85;transform:scale(1.07)}}
@keyframes flagIn{
  0%{transform:translateZ(-1200px) scale(.04) rotateX(18deg);opacity:.2;filter:blur(2px)}
  100%{transform:translateZ(0) scale(1) rotateX(0);opacity:1;filter:blur(0)}}
@keyframes flagSlam{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes flagSway{0%,100%{transform:rotate(-1.2deg)}50%{transform:rotate(1.2deg)}}
@keyframes riseIn{0%{transform:translateY(60px) scale(.9);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes sweep{0%{transform:translateX(-130%)}100%{transform:translateX(130%)}}
@keyframes msgIn{0%{transform:translateY(18px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes ruleIn{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes btnIn{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes btnPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}

@media (max-height:680px){
  .salah{width:min(48vw,190px);margin-top:-12%}
  .msg{margin-top:11px}
}
@media (prefers-reduced-motion:reduce){
  .glow,.flagFly,.flag,.flag.sway,.salah,.sweep,.msgAr,.rule,.msgEn,.chant,.chant.pulse,.chantSub{
    animation:none!important;opacity:1!important;transform:none!important;filter:none!important}
  #egyWin.go .stage{animation:fadeIn .3s both}
}
</style>
</head>
<body>

<!-- ===== faux app backdrop: the Matches tab after Egypt's win ===== -->
<header class="topbar">
  <div class="brand"><span class="dot"></span><span class="b1">World Cup</span>&nbsp;<span class="b2">Fans</span></div>
  <div class="tabs"><span class="t">Home</span><span class="t on">Matches</span><span class="t">Groups</span><span class="t">Predict</span><span class="t">More</span></div>
</header>

<main class="wrap">

  <div class="mc win">

    <div class="team w"><span class="flagdot eg">EG</span><span class="tn">Egypt</span><span class="sc">2</span></div>

  </div>

  <div class="mc dim">
    <div class="ftrow"><span class="ft">FULL TIME</span></div>
    <div class="team"><span class="flagdot">A</span><span class="tn">Team A</span><span class="sc">1</span></div>
    <div class="team"><span class="flagdot">B</span><span class="tn">Team B</span><span class="sc">1</span></div>
  </div>
  <div class="mc dim">
    <div class="ftrow"><span class="ft">19:00 · UAE</span></div>
    <div class="team"><span class="flagdot">C</span><span class="tn">Team C</span><span class="sc">-</span></div>
    <div class="team"><span class="flagdot">D</span><span class="tn">Team D</span><span class="sc">-</span></div>
  </div>

  <p class="demo-note">Demo preview · this is the celebration that plays when Egypt wins</p>
</main>

<button class="replay" onclick="playEgyptWin()">🎉 Replay celebration</button>

<nav class="botnav">
  <span><b>🏠</b>Home</span><span class="on"><b>⚽</b>Matches</span><span><b>📊</b>Groups</span><span><b>🎯</b>Predict</span><span><b>⋯</b>More</span>
</nav>

function startConfetti(){
  if (reduceMotion) return;
  const cv = overlay.querySelector(".cfx"); if (!cv) return;
  const ctx = cv.getContext("2d"); if (!ctx) return;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  let W = cv.width = innerWidth * dpr, H = cv.height = innerHeight * dpr;
  cv.style.width = innerWidth + "px"; cv.style.height = innerHeight + "px";
  const lowEnd = (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) ||
                 (navigator.deviceMemory && navigator.deviceMemory <= 4) || innerWidth < 380;
  const CAP = lowEnd ? 65 : 130;
  const COLORS = [["#ce1126",.35],["#ffffff",.30],["#c09e5f",.20],["#00a85a",.10],["#6dffb5",.05]];
  function pick(){ let r = Math.random(), a = 0; for (const cw of COLORS){ a += cw[1]; if (r <= a) return cw[0]; } return "#fff"; }
  const parts = [];
  function spawn(n){ for (let i=0;i<n;i++){ const rib = Math.random() < .22;
    parts.push({ x:rand(0,W), y:rand(-120,-10)*dpr, w:(rib?3:rand(5,11))*dpr, h:(rib?rand(12,22):rand(5,11))*dpr,
      c:pick(), vy:rand(1.6,3.4)*dpr, vx:rand(-.6,.6)*dpr, rot:rand(0,6.28), vr:rand(-.2,.2), seed:rand(0,100), a:1 }); } }
  let t0 = null, lastTs = null;
  function frame(ts){
    if (t0 === null) t0 = ts; if (lastTs === null) lastTs = ts;
    const el = ts - t0; let dt = (ts - lastTs) / 16.67; lastTs = ts; if (dt > 3) dt = 3; if (dt <= 0) dt = 1;
    if (el < 400 && parts.length < CAP){ const want = Math.min(CAP, Math.round(CAP * (0.6 + 0.4 * (el/400)))); if (parts.length < want) spawn(want - parts.length); }
    ctx.clearRect(0,0,W,H);
    for (let i = parts.length-1; i >= 0; i--){ const p = parts[i];
      p.vy *= Math.pow(0.999, dt); p.y += p.vy * dt; p.x += (p.vx + Math.sin(ts*0.002 + p.seed) * 0.4 * dpr) * dt; p.rot += p.vr * dt;
      if (p.y > H - 600*dpr) p.a = Math.max(0, (H - p.y) / (600*dpr));
      ctx.save(); ctx.globalAlpha = Math.max(0, Math.min(1, p.a)); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
      if (p.y > H + 20 || p.a <= 0) parts.splice(i,1);
    }
    if (el > 5200 || (el > 900 && parts.length === 0)){ cancelAnimationFrame(_raf); _raf = 0; cv.style.display = "none"; return; }
    _raf = requestAnimationFrame(frame);
  }
  _raf = requestAnimationFrame(frame);
}

function playEgyptWin(){
  closeEgyptWin(true);              // reset any prior run instantly
  _prevFocus = document.activeElement;
  buildOverlay();
  overlay.style.display = "flex";
  overlay.dataset.open = "1";
  lockScroll();
  // force reflow so the fade + keyframes start cleanly, then go
  void overlay.offsetWidth;            // flush the opacity:0 start state
  overlay.classList.add("go");          // then transition in (no rAF dependency, robust if frames are throttled)
  if (!reduceMotion){
    later(function(){ try{ navigator.vibrate && navigator.vibrate(18); }catch(e){} startConfetti(); }, 650);
    later(function(){ const f = overlay.querySelector(".flag"); if (f) f.classList.add("sway"); }, 2200);
    later(function(){ const c = overlay.querySelector(".chant"); if (c) c.classList.add("pulse"); }, 1950);
    later(function(){ overlay.querySelectorAll(".flagFly,.flag,.salah,.msgAr,.msgEn").forEach(function(el){ el.style.willChange = "auto"; }); }, 2800);
  }
  // focus the chant for keyboard users
  later(function(){ const c = overlay.querySelector(".chant"); if (c) try{ c.focus({preventScroll:true}); }catch(e){ c.focus(); } }, reduceMotion ? 320 : 1600);
  // safety auto-dismiss
  later(function(){ closeEgyptWin(); }, 15000);
}

function closeEgyptWin(instant){
  _timers.forEach(clearTimeout); _timers = [];
  if (_raf){ cancelAnimationFrame(_raf); _raf = 0; }
  if (overlay.dataset.open !== "1" && !instant){ return; }
  if (instant){ overlay.classList.remove("go","bye"); overlay.style.display = "none"; overlay.dataset.open = ""; unlockScroll(); return; }
  overlay.classList.remove("go"); overlay.classList.add("bye"); overlay.dataset.open = "";
  setTimeout(function(){ overlay.style.display = "none"; overlay.classList.remove("bye"); overlay.innerHTML = ""; }, 340);
  unlockScroll();
  try{ if (_prevFocus && _prevFocus.focus) _prevFocus.focus({preventScroll:true}); }catch(e){}
}

// close on tap-anywhere (secondary), Esc, and trap focus on the one button
overlay.addEventListener("click", function(e){ if (e.target === overlay) closeEgyptWin(); });
window.addEventListener("keydown", function(e){
  if (overlay.dataset.open !== "1") return;
  if (e.key === "Escape"){ e.preventDefault(); closeEgyptWin(); }
  if (e.key === "Tab"){ e.preventDefault(); const c = overlay.querySelector(".chant"); if (c) c.focus(); }
});

// DEMO: fire on open, as if Egypt just won
window.addEventListener("load", function(){ setTimeout(playEgyptWin, 450); });
</script>
